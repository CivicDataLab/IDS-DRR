services:
  db:
    image: postgis/postgis:14-3.5
    platform: linux/amd64
    restart: always
    container_name: "context_layer_PG"
    environment:
      - POSTGRES_DB=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  redis:
    image: redis:7-alpine
    restart: always
    container_name: "context_layer_Redis"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
  backend:
    build:
      # Context is ./platform/ (not just data-management/) so a sibling
      # `ids-drr-plugin/` is reachable via the PLUGIN_PACKAGE build arg.
      context: ./platform
      dockerfile: data-management/Dockerfile
      args:
        CONTEXT_SUBDIR: data-management
        PLUGIN_PACKAGE: ${PLUGIN_PACKAGE:-data-management/plugin-stub}
    restart: always
    container_name: "context_layer_Backend"
    # In production, use a uvicorn command. The current command enables auto-reload.
    #   uvicorn D4D_ContextLayer.asgi:application --host 0.0.0.0 --port 8000
    command: python manage.py runserver 0.0.0.0:8000
    # The first mount is source code for live editing; remove it in production.
    # The second mount supplies the deployment-specific config.toml and its
    # referenced asset files (GeoJSON, indicator/data CSVs). Paths in
    # config.toml are resolved relative to its own directory. See
    # docs/platform/data-management.md for the expected layout.
    #
    # The default points at ids-drr-plugin/, since for the IDS-DRR India
    # deployment the plugin's source repo also ships its config.toml and
    # data files (one mount serves both PLUGIN_PACKAGE and CONFIG_PATH).
    # For deployments that don't ship a custom plugin (e.g. data-only),
    # set BACKEND_CONFIG_DIR to wherever the deployment's config.toml
    # lives and leave PLUGIN_PACKAGE at its default.
    volumes:
      - ./platform/data-management:/src/data-management
      - ${BACKEND_CONFIG_DIR:-./platform/ids-drr-plugin}:/config:ro
    ports:
      - "8000:8000"
    env_file:
      - path: ./platform/data-management/.env
        required: false
    environment:
      - POSTGRES_NAME=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      # WHITELIST_INDICATORS now lives at the top level of config.toml; the
      # env var is kept for backwards compatibility only.
      - WHITELIST_INDICATORS=${WHITELIST_INDICATORS:-topsis-score}
      # Location of the backend's config.toml inside the container. The
      # default points at the bind-mounted directory above. Override via
      # BACKEND_CONFIG_PATH on the host (e.g. in .env) — typically only
      # needed when the deployment's config.toml has a non-default name
      # or sits in a subdirectory of the mount source.
      - CONFIG_PATH=${BACKEND_CONFIG_PATH:-/config/config.toml}
      # In production, set to "production".
      - DJANGO_ENV=${DJANGO_ENV:-development}
      # In production, set to a random string.
      - SECRET_KEY=${SECRET_KEY:-!!!SECRET_KEY!!!}
      # In production, add your domain, like: backend,backend.example.com
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-backend}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
  frontend:
    container_name: "context_layer_Frontend"
    build:
      # Context is ./platform/ (not just frontend/) so a sibling
      # `ids-drr-branding/` is reachable via the BRANDING_PACKAGE build arg.
      context: ./platform
      dockerfile: frontend/Dockerfile
      # In production, remove `target`. This currently builds only through to the Dockerfile's dev stage.
      target: dev
      args:
        CONTEXT_SUBDIR: frontend
        BRANDING_PACKAGE: ${BRANDING_PACKAGE:-frontend/branding-stub}
    restart: always
    # In production, remove `command` to use the Dockerfile's CMD. The current command enables hot reload.
    command: npm run dev
    env_file:
      - path: ./platform/frontend/.env
        required: false
    environment:
      # In production, remove NODE_ENV, in order to default to "production".
      - NODE_ENV=development
      - DATA_MANAGEMENT_LAYER_URL=http://backend:8000
      # In production, set to your domain.
      - NEXT_PUBLIC_DATA_MANAGEMENT_LAYER_URL=${NEXT_PUBLIC_DATA_MANAGEMENT_LAYER_URL:-http://localhost:8000}
    # 1) source code for live editing (remove in production);
    # 2) the branding package dir (default: the stub inside this repo)
    #    bound onto /app/branding-stub so that
    #    `node_modules/ids-drr-branding` (an npm-managed symlink to
    #    ../branding-stub) resolves to the same tree at runtime as was
    #    installed at build time. Deployment config and assets both
    #    live inside the branding package; assets are bundled by
    #    Next.js via TS imports rather than served from a public dir.
    volumes:
      - ./platform/frontend:/app
      - ./platform/${BRANDING_PACKAGE:-frontend/branding-stub}:/app/branding-stub
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

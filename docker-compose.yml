services:
  db:
    image: postgis/postgis:14-3.5
    platform: linux/amd64
    restart: always
    container_name: "context_layer_PG"
    environment:
      - POSTGRES_DB=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  redis:
    image: redis:7-alpine
    restart: always
    container_name: "context_layer_Redis"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
  backend:
    build:
      context: ./platform/data-management
    restart: always
    container_name: "context_layer_Backend"
    # In production, use a uvicorn command. The current command enables auto-reload.
    #   uvicorn D4D_ContextLayer.asgi:application --host 0.0.0.0 --port 8000
    command: python manage.py runserver 0.0.0.0:8000
    # In production, remove `volumes`, which currently mounts the source code for live editing.
    volumes:
      - ./platform/data-management:/code
    ports:
      - "8000:8000"
    env_file:
      - path: ./platform/data-management/.env
        required: false
    environment:
      - POSTGRES_NAME=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - WHITELIST_INDICATORS=${WHITELIST_INDICATORS:-topsis-score}
      # In production, set to "production".
      - DJANGO_ENV=${DJANGO_ENV:-development}
      # In production, set to a random string.
      - SECRET_KEY=${SECRET_KEY:-!!!SECRET_KEY!!!}
      # In production, add your domain, like: backend,backend.example.com
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-backend}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8000), timeout=2).close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
  frontend:
    container_name: "context_layer_Frontend"
    build:
      context: ./platform/frontend
      # In production, remove `target`. This currently builds only through to the Dockerfile's dev stage. 
      target: dev
    restart: always
    # In production, remove `command` to use the Dockerfile's CMD. The current command enables hot reload.
    command: npm run dev
    env_file:
      - path: ./platform/frontend/.env
        required: false
    environment:
      # In production, remove NODE_ENV, in order to default to "production".
      - NODE_ENV=development
      - DATA_MANAGEMENT_LAYER_URL=http://backend:8000
      # In production, set to your domain.
      - NEXT_PUBLIC_DATA_MANAGEMENT_LAYER_URL=${NEXT_PUBLIC_DATA_MANAGEMENT_LAYER_URL:-http://localhost:8000}
    # In production, remove `volumes`, which currently mounts the source code for live editing.
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data

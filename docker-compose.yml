services:
  db:
    image: postgis/postgis:14-3.5
    platform: linux/amd64
    restart: always
    container_name: "context_layer_PG"
    environment:
      - POSTGRES_DB=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  redis:
    image: redis:7-alpine
    restart: always
    container_name: "context_layer_Redis"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
  backend:
    build:
      context: ./platform/data-management
    restart: always
    container_name: "context_layer_Backend"
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./platform/data-management:/code
    ports:
      - "8000:8000"
    env_file:
      - path: ./platform/data-management/.env
        required: false
    environment:
      - POSTGRES_NAME=${POSTGRES_NAME:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - WHITELIST_INDICATORS=topsis-score
      - SECRET_KEY=${SECRET_KEY:-!!!SECRET_KEY!!!}
      - ALLOWED_HOSTS=backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
  frontend:
    container_name: "context_layer_Frontend"
    build:
      context: ./platform/frontend
      target: dev
    restart: always
    command: npm run dev
    env_file:
      - path: ./platform/frontend/.env
        required: false
    environment:
      - NODE_ENV=development
      - DATA_MANAGEMENT_LAYER_URL=http://backend:8000
      - NEXT_PUBLIC_DATA_MANAGEMENT_LAYER_URL=http://localhost:8000
    volumes:
      - ./platform/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
volumes:
  postgres_data:
    name: postgres_data
  redis_data:
    name: redis_data
